version: "3.8"

services:
  nec-solver:
    build:
      context: ./docker/nec_solver
      dockerfile: Dockerfile
    container_name: ac-nec-solver
    ports:
      - "${NEC_SOLVER_PORT:-8787}:8787"
    environment:
      - NEC_BIN=${NEC_BIN:-nec2c}
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8787/healthz').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    container_name: ac-dashboard
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    environment:
      - NEC_DIR=/data/nec_files
      - NEC_SOLVER_URL=http://ac-nec-solver:8787
      - ROOT_PATH=/antenna
      # Postgres (hamfeeds wspr database on shared Docker network)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-wspr}
      - POSTGRES_USER=${POSTGRES_USER:-wspr_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_this_password_in_production}
    volumes:
      - ${NEC_FILES_DIR:-./nec_files}:/data/nec_files:ro
      - user_nec_files:/data/user_nec_files
    secrets:
      - openai_api_key
    networks:
      - default
      - hamfeeds_wspr_network
    depends_on:
      nec-solver:
        condition: service_healthy

volumes:
  user_nec_files:

secrets:
  openai_api_key:
    file: ${OPENAI_API_KEY_FILE:-./.secrets/openai_api_key}

networks:
  hamfeeds_wspr_network:
    external: true
