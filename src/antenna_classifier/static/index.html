<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Antenna Classifier — AntennaForge</title>
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<link rel="stylesheet" href="__ROOT_PATH__/static/css/platform.css">
<script src="__ROOT_PATH__/static/js/platform-nav.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --surface-alt: #1c2430; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #bc8cff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5;
}
a { color: var(--accent); text-decoration: none; }

/* Layout */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 18px; font-weight: 600; }
.header .stats { margin-left: auto; display: flex; gap: 16px; font-size: 13px; color: var(--muted); }
.header .stats span { color: var(--text); font-weight: 600; }

.workspace-nav {
  display: flex; gap: 8px; padding: 10px 24px; background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.workspace-tab {
  padding: 8px 14px; border-radius: 999px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 600;
}
.workspace-tab:hover { color: var(--text); border-color: var(--accent); }
.workspace-tab.active { background: rgba(88,166,255,0.14); color: var(--accent); border-color: rgba(88,166,255,0.4); }

.container { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 49px - 56px - 53px); }
.container.mode-lab { grid-template-columns: 1fr; }

/* Sidebar */
.sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.container.mode-lab .sidebar { display: none; }
.sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.sidebar-header input {
  width: 100%; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 13px; outline: none;
}
.sidebar-header input:focus { border-color: var(--accent); }

.filter-bar { display: flex; gap: 8px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-bar select {
  padding: 4px 8px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-size: 12px;
}

.file-list { flex: 1; overflow-y: auto; }
.file-item {
  padding: 8px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
  display: flex; flex-direction: column; gap: 2px; transition: background 0.1s;
}
.file-item:hover { background: rgba(88,166,255,0.08); }
.file-item.active { background: rgba(88,166,255,0.15); border-left: 3px solid var(--accent); }
.file-item .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-item .meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; align-items: center; }

.badge {
  display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-type { background: rgba(88,166,255,0.15); color: var(--accent); }
.badge-band { background: rgba(188,140,255,0.15); color: var(--purple); }
.badge-valid { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-invalid { background: rgba(248,81,73,0.15); color: var(--red); }
.badge-conf { background: rgba(210,153,34,0.12); color: var(--yellow); }

/* Main content */
.main { overflow-y: auto; padding: 24px; }
.main h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

.welcome-msg { text-align: center; padding: 80px 40px; color: var(--muted); }
.welcome-msg h2 { font-size: 24px; color: var(--text); margin-bottom: 8px; }

/* Summary dashboard */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
.summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.summary-card h3 { font-size: 13px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.summary-card .big-number { font-size: 36px; font-weight: 700; }

/* Detail view */
.detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
.detail-title { font-size: 20px; font-weight: 600; word-break: break-all; }
.detail-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.info-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.info-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.info-card .value { font-size: 18px; font-weight: 600; margin-top: 2px; }

.section { margin-bottom: 24px; }
.section h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

.evidence-list { list-style: none; }
.evidence-list li { padding: 4px 0; font-size: 13px; color: var(--muted); }
.evidence-list li::before { content: '→ '; color: var(--accent); }

.validation-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.validation-table th { text-align: left; padding: 6px 8px; border-bottom: 2px solid var(--border); color: var(--muted); font-weight: 600; }
.validation-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
.validation-table .sev-error { color: var(--red); }
.validation-table .sev-warning { color: var(--yellow); }
.validation-table .sev-info { color: var(--accent); }

.nec-viewer { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; max-height: 300px; overflow: auto; white-space: pre; line-height: 1.4; color: var(--muted); }

/* Simulation */
.sim-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
.btn {
  padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: var(--surface); color: var(--text); }
.sim-status { font-size: 13px; color: var(--muted); }

.plot-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 16px; }
.plot-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.plot-card h4 { font-size: 12px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
.plot-box { width: 100%; min-height: 320px; }
.pat-btn { background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 3px 10px; cursor: pointer; font-size: 11px; text-transform: none; }
.pat-btn:hover { color: var(--fg); border-color: #58a6ff; }
.pat-btn.active { color: #58a6ff; border-color: #58a6ff; }
.dr-select { background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.dr-select:hover { color: var(--fg); border-color: #58a6ff; }

.sim-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
.sim-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
.sim-stat .label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
.sim-stat .value { font-size: 20px; font-weight: 700; margin-top: 2px; }
.sim-insights { margin-bottom: 16px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); }
.sim-insights h4 { margin: 0 0 8px; font-size: 13px; }
.sim-dip-list { display: flex; flex-wrap: wrap; gap: 8px; }
.sim-dip-chip { display: inline-flex; flex-direction: column; gap: 2px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface-alt); min-width: 120px; }
.sim-dip-chip strong { font-size: 13px; }
.sim-dip-chip span { font-size: 11px; color: var(--muted); }
.sim-dip-chip.best { border-color: var(--green); }
.sim-dip-chip.nearest { border-color: var(--accent); }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab {
  padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
  border-bottom: 2px solid transparent; color: var(--muted); transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* Loading spinner */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* OODA 4-square indicator */
.ooda-grid { display: inline-grid; grid-template-columns: 1fr 1fr; gap: 4px; vertical-align: middle; margin-right: 8px; }
.ooda-cell {
  width: 22px; height: 22px; border-radius: 3px; background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700; color: var(--muted); text-transform: uppercase;
  transition: background 0.2s;
}
.ooda-cell.active { background: var(--red); color: #fff; animation: ooda-blink 0.8s ease-in-out infinite; }
.ooda-cell.done { background: var(--green); color: #fff; animation: none; }
@keyframes ooda-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* My Antennas panel */
.my-antennas-panel { border-bottom: 1px solid var(--border); }
.my-antennas-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; cursor: pointer; user-select: none;
  background: linear-gradient(135deg, rgba(88,166,255,0.08), rgba(188,140,255,0.08));
}
.my-antennas-header h3 { font-size: 12px; text-transform: uppercase; color: var(--accent); margin: 0; }
.my-antennas-header .count { font-size: 11px; color: var(--muted); }
.my-antennas-header .toggle-arrow { color: var(--muted); font-size: 10px; transition: transform 0.2s; }
.my-antennas-header .toggle-arrow.open { transform: rotate(90deg); }
.my-antennas-body { display: none; max-height: 250px; overflow-y: auto; }
.my-antennas-body.open { display: block; }
.my-antenna-item {
  padding: 8px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.my-antenna-item:hover { background: rgba(88,166,255,0.06); }
.my-antenna-item.active { background: rgba(88,166,255,0.12); border-left: 3px solid var(--accent); }
.my-antenna-item .name { font-size: 13px; font-weight: 500; }
.my-antenna-item .meta { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 3px; }
.my-antenna-actions { padding: 8px 16px; display: flex; gap: 6px; }
.btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; font-weight: 600; }
.btn-ai { background: var(--accent); color: #fff; border: none; }
.btn-ai:hover { opacity: 0.85; }
.btn-pdf { background: var(--surface); color: var(--text); }
.btn-pdf:hover { border-color: #58a6ff; }
.btn-del { background: transparent; color: var(--red); border-color: var(--red); padding: 2px 6px; font-size: 10px; }
.btn-del:hover { background: rgba(248,81,73,0.15); }

.lab-shell { display: grid; gap: 18px; }
.lab-hero { padding: 18px; border-radius: 12px; border: 1px solid var(--border); background: linear-gradient(135deg, rgba(88,166,255,0.12), rgba(22,27,34,0.95)); }
.lab-hero h2 { margin-bottom: 6px; }
.lab-hero p { color: var(--muted); max-width: 760px; }
.lab-layout { display: grid; gap: 18px; }
.lab-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
.lab-card, .lab-workspace, .lab-section-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
}
.lab-card { padding: 14px; cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
.lab-card:hover, .lab-card.active { border-color: var(--accent); transform: translateY(-1px); }
.lab-card h3 { margin-bottom: 4px; font-size: 15px; }
.lab-card p { color: var(--muted); font-size: 12px; }
.lab-pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 10px; }
.lab-pill {
  display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 999px;
  font-size: 11px; font-weight: 600; background: rgba(88,166,255,0.12); color: var(--accent);
}
.lab-workspace { padding: 18px; display: grid; gap: 18px; }
.lab-topbar { display: flex; gap: 12px; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; }
.lab-topbar p { color: var(--muted); max-width: 720px; }
.lab-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 12px; }
.lab-stat { padding: 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface-alt); }
.lab-stat .label { font-size: 10px; text-transform: uppercase; color: var(--muted); }
.lab-stat .value { font-size: 18px; font-weight: 700; margin-top: 2px; line-height: 1.15; }
.lab-stat .secondary { font-size: 11px; color: var(--muted); margin-top: 4px; }
.lab-stage { display: grid; grid-template-columns: minmax(320px, 0.9fr) minmax(520px, 1.1fr); gap: 16px; align-items: start; }
.lab-controls-pane { display: grid; gap: 16px; align-self: start; }
.lab-results-pane { display: grid; gap: 16px; position: sticky; top: 16px; align-self: start; }
.lab-controls { display: grid; gap: 12px; }
.lab-control { padding: 12px; border-radius: 10px; background: var(--surface-alt); border: 1px solid var(--border); }
.lab-control.next-action { border-color: rgba(248,81,73,0.55); box-shadow: 0 0 0 1px rgba(248,81,73,0.2); animation: lab-next-action-blink 0.9s ease-in-out infinite; }
.lab-control.next-action .lab-control-head strong { color: #ff938a; }
.lab-control.useful-match { border-color: rgba(63,185,80,0.55); box-shadow: 0 0 0 1px rgba(63,185,80,0.22); animation: lab-useful-match-blink 0.95s ease-in-out infinite; }
.lab-control.useful-match .lab-control-head strong { color: #9be9a8; }
.lab-control-callout { margin-top: 8px; color: #ff938a; font-size: 12px; font-weight: 600; }
.lab-control-callout.useful { color: #9be9a8; }
.lab-control-feedback { margin-top: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); background: rgba(88,166,255,0.08); display: grid; gap: 2px; }
.lab-control-feedback .metric { font-size: 12px; font-weight: 700; }
.lab-control-feedback .target { font-size: 11px; color: var(--muted); }
.lab-control-feedback.in-range { border-color: rgba(63,185,80,0.28); background: rgba(63,185,80,0.10); }
.lab-control-feedback.useful { border-color: rgba(63,185,80,0.32); background: rgba(63,185,80,0.12); animation: lab-useful-match-blink 0.95s ease-in-out infinite; }
.lab-control-feedback.pending { border-color: rgba(48,54,61,0.9); background: rgba(139,148,158,0.08); }
.lab-control-feedback.low, .lab-control-feedback.high { border-color: rgba(210,153,34,0.28); background: rgba(210,153,34,0.10); }
.lab-control-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.lab-control-head strong { font-size: 13px; }
.lab-control small { color: var(--muted); display: block; margin-top: 4px; }
.lab-control input[type="range"] { width: 100%; }
.lab-control input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
.lab-toggle-row { display: flex; align-items: center; gap: 10px; }
.lab-actions { display: flex; flex-wrap: wrap; gap: 8px; }
.lab-section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.lab-inline-hint { font-size: 12px; color: var(--muted); }
.lab-status-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.lab-status-chip {
  display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px;
  border: 1px solid var(--border); background: rgba(139,148,158,0.12); color: var(--text); font-size: 12px; font-weight: 600;
}
.lab-status-chip.ready { border-color: rgba(63,185,80,0.25); background: rgba(63,185,80,0.12); color: #9be9a8; }
.lab-status-chip.pending { border-color: rgba(210,153,34,0.28); background: rgba(210,153,34,0.12); color: #f2cc60; }
.lab-status-chip.error { border-color: rgba(248,81,73,0.3); background: rgba(248,81,73,0.12); color: #ff938a; }
.lab-status-chip.next-action { animation: lab-next-action-blink 0.9s ease-in-out infinite; }
.lab-live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.lab-stat.pending { border-color: rgba(210,153,34,0.25); box-shadow: inset 0 0 0 1px rgba(210,153,34,0.12); }
.lab-stat.live { border-color: rgba(88,166,255,0.28); }
.lab-meta-grid { display: grid; gap: 14px; }
.lab-note-list { display: grid; gap: 8px; }
.lab-note { padding: 10px 12px; border-radius: 10px; background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.18); color: var(--text); font-size: 13px; }
.lab-equation { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface-alt); }
.lab-equation strong { display: block; font-size: 12px; margin-bottom: 4px; color: var(--muted); text-transform: uppercase; }
.lab-equation code { display: block; font-family: 'Consolas', 'Courier New', monospace; font-size: 15px; color: var(--text); margin-bottom: 6px; }
.lab-guidance { display: grid; gap: 8px; }
.lab-guidance-item { padding: 10px 12px; border-radius: 10px; background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.18); font-size: 13px; }
.lab-step-list { display: grid; gap: 10px; }
.lab-step { padding: 12px; border-radius: 10px; background: var(--surface-alt); border: 1px solid var(--border); display: grid; gap: 6px; }
.lab-step strong { font-size: 13px; }
.lab-step-detail { color: var(--text); font-size: 13px; }
.lab-step-target { color: var(--muted); font-size: 12px; }
.lab-progress-grid { display: grid; gap: 8px; }
.lab-progress-chip { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(88,166,255,0.08); display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
.lab-progress-chip.in-range { border-color: rgba(63,185,80,0.28); background: rgba(63,185,80,0.10); }
.lab-progress-chip.pending { border-color: rgba(48,54,61,0.9); background: rgba(139,148,158,0.08); }
.lab-progress-chip.low,
.lab-progress-chip.high { border-color: rgba(210,153,34,0.28); background: rgba(210,153,34,0.10); }
.lab-progress-chip .metric { font-size: 14px; font-weight: 600; }
.lab-progress-chip .target { color: var(--muted); font-size: 12px; }
.lab-plot-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.lab-plot-box { min-height: 320px; }
.lab-3d-box { width: 100%; height: 320px; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; position: relative; }

@keyframes lab-next-action-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.38; }
}

@keyframes lab-useful-match-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.52; }
}

@media (max-width: 1100px) {
  .lab-stage { grid-template-columns: 1fr; }
  .lab-results-pane { position: static; top: auto; }
}

.notes-modal { width: min(820px, 94vw); }
.lab-notes-grid { display: grid; gap: 14px; }
.lab-notes-grid .lab-section-card { padding: 16px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; width: 480px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
}
.modal h2 { font-size: 16px; margin-bottom: 16px; }
.modal label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; text-transform: uppercase; font-weight: 600; }
.modal input, .modal select, .modal textarea {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text); font-size: 13px; box-sizing: border-box;
}
.modal textarea { resize: vertical; min-height: 60px; font-family: inherit; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal-status { font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 18px; }
/* Create-modal tabs */
.create-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin: -4px -24px 16px; padding: 0 24px; }
.create-tab { padding: 8px 14px; font-size: 12px; font-weight: 600; background: none; border: none;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.create-tab:hover { color: var(--text); }
.create-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.create-pane { display: none; }
.create-pane.active { display: block; }
.surprise-pane { text-align: center; padding: 32px 0; }
.surprise-pane p { color: var(--muted); font-size: 13px; margin: 12px 0; }
.surprise-pane .btn-ai { font-size: 15px; padding: 12px 32px; border-radius: 8px; }

/* Layout uses platform-nav.js top bar instead of left site-nav */
</style>
</head>
<body>

<div class="header">
  <h1>&#x1F4E1; Antenna Classifier</h1>
  <div class="stats" id="header-stats"></div>
</div>

<div class="workspace-nav">
  <button class="workspace-tab active" id="workspace-tab-browse" onclick="setWorkspaceMode('browse')">Catalog / My Antennas</button>
  <button class="workspace-tab" id="workspace-tab-lab" onclick="openTuningLab()">Tuning Lab</button>
</div>

<div class="container mode-browse" id="app-container">
  <!-- Sidebar: file list -->
  <div class="sidebar">
    <!-- My Antennas panel -->
    <div class="my-antennas-panel">
      <div class="my-antennas-header" onclick="toggleMyAntennas()">
        <h3>&#x2728; My Antennas <span class="count" id="my-antenna-count"></span></h3>
        <span class="toggle-arrow" id="my-antenna-arrow">&#x25B6;</span>
      </div>
      <div class="my-antennas-body" id="my-antennas-body">
        <div class="my-antenna-actions" id="my-antenna-actions" style="display:none;">
          <button class="btn-sm btn-ai" onclick="openCreateModal()">&#x2728; Create Antenna</button>
        </div>
        <div id="my-antenna-list"></div>
      </div>
    </div>

    <div class="sidebar-header">
      <input type="text" id="search-input" placeholder="Search files...">
    </div>
    <div class="filter-bar">
      <select id="filter-type"><option value="">All types</option></select>
      <select id="filter-band"><option value="">All bands</option></select>
      <select id="filter-valid">
        <option value="">All</option>
        <option value="valid">Valid only</option>
        <option value="invalid">Invalid only</option>
        <option value="needs_review">Needs review</option>
      </select>
    </div>
    <div class="file-list" id="file-list"></div>
  </div>

  <!-- Main: detail or welcome -->
  <div class="main" id="main-content">
    <div class="welcome-msg" id="welcome">
      <h2>Antenna Classifier Dashboard</h2>
      <p>Select a file from the sidebar to view its classification and run simulations.</p>
      <div id="summary-area" style="margin-top: 32px; text-align: left;"></div>
    </div>
    <div id="tuning-lab-view" style="display:none;"></div>
    <div id="detail-view" style="display:none;"></div>
  </div>
</div>

<script>
// ---- State ----
function normalizeBasePath(value) {
  if (!value || value === '/' || value === 'null' || value === 'undefined') {
    return '';
  }
  return value.replace(/\/+$/, '');
}

// Trust the browser URL first so standalone container access keeps using /api/*
// even when ROOT_PATH is configured for a reverse proxy mount like /antenna.
const ROOT_PATH = "__ROOT_PATH__";
const CONFIGURED_BASE_URL = normalizeBasePath(ROOT_PATH);
const LOCATION_BASE_URL = normalizeBasePath(window.location.pathname);
const IS_ROOT_REQUEST = window.location.pathname === '/' || window.location.pathname === '';
const BASE_URL = IS_ROOT_REQUEST ? '' : (LOCATION_BASE_URL || CONFIGURED_BASE_URL);
const PLATFORM_NAV_PATH = BASE_URL ? `${BASE_URL}/` : '/antenna/';
window.__BASE_URL = BASE_URL;
let catalog = [];
let summary = {};
let reviewQueue = [];
let activeFile = null;
let currentUser = null;
let antennaTypes = [];
let tuningLabExercises = [];
let activeTuningExercise = null;
let activeTuningResult = null;
let tuningLabValues = {};
const TUNING_LIVE_DEBOUNCE_MS = 260;
let tuningLabDebounceHandle = null;
let tuningLabRunCounter = 0;
let tuningLabIsRunning = false;
let tuningLabRunStatus = 'idle';
let tuningLabAppliedValues = {};
let tuningLabLastRunAt = '';
let tuningLab3DRequestCounter = 0;
let tuningLabPatternType = 'elevation';
let tuningLabPatternTypeManual = false;

function getExerciseDefaultPatternType(exercise = activeTuningExercise) {
  return exercise?.default_pattern_type === 'azimuth' ? 'azimuth' : 'elevation';
}
let tuningLabPatternRequestCounter = 0;
let _lastTuningLabPatData = null;

// ---- Boot ----
document.addEventListener('DOMContentLoaded', async () => {
  // Render platform top nav (fetches /api/me from hamfeeds)
  renderPlatformNav({ apiBase: BASE_URL, currentPath: PLATFORM_NAV_PATH, cssHref: `${BASE_URL}/static/css/platform.css` });
  await checkCurrentUser();
  await loadCatalog();
});

async function checkCurrentUser() {
  try {
    const resp = await fetch(`${BASE_URL}/api/me`).then(r => r.json());
    if (resp.authenticated) {
      if (resp.ai_enabled) {
        currentUser = resp;
        document.getElementById('my-antenna-actions').style.display = '';
      }
    }
  } catch {
    // auth check failed — platform nav handles login state
  }
}

// ---- Site Navigation handled by platform-nav.js ----

async function loadCatalog() {
  const [catResp, sumResp, queueResp, labResp] = await Promise.all([
    fetch(`${BASE_URL}/api/catalog`).then(r => r.json()),
    fetch(`${BASE_URL}/api/summary`).then(r => r.json()),
    fetch(`${BASE_URL}/api/review-queue?limit=12`).then(r => r.json()),
    fetch(`${BASE_URL}/api/tuning-lab/exercises`).then(r => r.json()).catch(() => ({ exercises: [] })),
  ]);
  catalog = catResp.files || [];
  summary = sumResp;
  reviewQueue = queueResp.files || [];
  tuningLabExercises = labResp.exercises || [];
  renderStats();
  populateFilters();
  renderFileList(catalog);
  renderSummary();
  // Auto-refresh while catalog is still loading
  if (catResp.loading) {
    document.getElementById('header-stats').innerHTML += ' <span style="color:var(--yellow);font-size:11px;">(scanning...)</span>';
    setTimeout(refreshCatalog, 3000);
  }
}

async function refreshCatalog() {
  try {
    const [catResp, sumResp, queueResp] = await Promise.all([
      fetch(`${BASE_URL}/api/catalog`).then(r => r.json()),
      fetch(`${BASE_URL}/api/summary`).then(r => r.json()),
      fetch(`${BASE_URL}/api/review-queue?limit=12`).then(r => r.json()),
    ]);
    catalog = catResp.files || [];
    summary = sumResp;
    reviewQueue = queueResp.files || [];
    renderStats();
    applyFilters(); // preserve active filters instead of resetting to full catalog
    renderSummary();
    if (catResp.loading) {
      document.getElementById('header-stats').innerHTML += ' <span style="color:var(--yellow);font-size:11px;">(scanning...)</span>';
      setTimeout(refreshCatalog, 3000);
    }
  } catch {}
}

// ---- Header stats ----
function renderStats() {
  const el = document.getElementById('header-stats');
  el.innerHTML = `
    <div>Files: <span>${summary.total || 0}</span></div>
    <div>Valid: <span style="color:var(--green)">${summary.valid || 0}</span></div>
    <div>Invalid: <span style="color:var(--red)">${summary.invalid || 0}</span></div>
    <div>Review Queue: <span style="color:var(--yellow)">${summary.needs_review || 0}</span></div>
    <div>Types: <span>${Object.keys(summary.types || {}).length}</span></div>
  `;
}

// ---- Filters ----
function populateFilters() {
  const typeSelect = document.getElementById('filter-type');
  const bandSelect = document.getElementById('filter-band');
  for (const t of Object.keys(summary.types || {}).sort()) {
    typeSelect.innerHTML += `<option value="${esc(t)}">${esc(t)} (${summary.types[t]})</option>`;
  }
  for (const b of Object.keys(summary.bands || {}).sort()) {
    bandSelect.innerHTML += `<option value="${esc(b)}">${esc(b)} (${summary.bands[b]})</option>`;
  }
  document.getElementById('filter-type').addEventListener('change', applyFilters);
  document.getElementById('filter-band').addEventListener('change', applyFilters);
  document.getElementById('filter-valid').addEventListener('change', applyFilters);
  document.getElementById('search-input').addEventListener('input', applyFilters);
}

function applyFilters() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const typeVal = document.getElementById('filter-type').value;
  const bandVal = document.getElementById('filter-band').value;
  const validVal = document.getElementById('filter-valid').value;
  let filtered = catalog;
  if (search) filtered = filtered.filter(f => f.filename.toLowerCase().includes(search) || (f.antenna_type||'').includes(search));
  if (typeVal) filtered = filtered.filter(f => f.antenna_type === typeVal);
  if (bandVal) filtered = filtered.filter(f => f.band === bandVal);
  if (validVal === 'valid') filtered = filtered.filter(f => f.valid);
  if (validVal === 'invalid') filtered = filtered.filter(f => !f.valid);
  if (validVal === 'needs_review') filtered = filtered.filter(f => f.needs_review);
  renderFileList(filtered);
}

// ---- File list ----
function renderFileList(files) {
  const el = document.getElementById('file-list');
  if (!files.length) { el.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center;">No files match</div>'; return; }
  el.innerHTML = files.map(f => `
    <div class="file-item${activeFile === f.filename ? ' active' : ''}" data-file="${esc(f.filename)}" onclick="selectFile('${esc(f.filename)}')">
      <div class="name">${esc(f.filename)}</div>
      <div class="meta">
        <span class="badge badge-type">${esc(f.antenna_type || 'unknown')}</span>
        ${f.is_reviewed ? `<span class="badge badge-band" title="Human-reviewed classification">reviewed</span>` : ''}
        ${f.band ? `<span class="badge badge-band">${esc(f.band)}</span>` : ''}
        <span class="badge ${f.valid ? 'badge-valid' : 'badge-invalid'}">${f.valid ? 'valid' : 'invalid'}</span>
        <span class="badge badge-conf">${(f.confidence*100).toFixed(0)}%</span>
      </div>
    </div>
  `).join('');
}

// ---- Summary (shown on welcome) ----
function renderSummary() {
  const el = document.getElementById('summary-area');
  el.innerHTML = `
    <div class="summary-grid">
      <div class="summary-card">
        <h3>Total Files</h3>
        <div class="big-number">${summary.total || 0}</div>
      </div>
      <div class="summary-card">
        <h3>Valid</h3>
        <div class="big-number" style="color:var(--green)">${summary.valid || 0}</div>
      </div>
      <div class="summary-card">
        <h3>Antenna Types</h3>
        <div class="big-number">${Object.keys(summary.types || {}).length}</div>
      </div>
      <div class="summary-card">
        <h3>Needs Review</h3>
        <div class="big-number" style="color:var(--yellow)">${summary.needs_review || 0}</div>
      </div>
    </div>
    <div class="section">
      <h3>Type Distribution</h3>
      <div id="summary-type-chart" style="width:100%;"></div>
    </div>
    <div class="section">
      <h3>Band Distribution</h3>
      <div id="summary-band-chart" style="width:100%;height:300px;"></div>
    </div>
    <div class="section">
      <h3>Review Queue</h3>
      <div id="review-queue-list"></div>
    </div>
  `;

  // Type distribution works better as a ranked bar chart than a donut
  // when there are many small categories and long labels.
  const types = summary.types || {};
  const typeChartEl = document.getElementById('summary-type-chart');
  const typeEntries = Object.entries(types).sort((a, b) => b[1] - a[1]);
  const topTypeLimit = 12;
  let displayTypeEntries = typeEntries.slice(0, topTypeLimit);
  if (typeEntries.length > topTypeLimit) {
    const otherCount = typeEntries.slice(topTypeLimit)
      .reduce((sum, [, count]) => sum + count, 0);
    if (otherCount > 0) displayTypeEntries.push(['other', otherCount]);
  }
  const orderedTypeEntries = displayTypeEntries.slice().reverse();
  const typeChartHeight = Math.max(360, orderedTypeEntries.length * 34 + 80);
  typeChartEl.style.height = `${typeChartHeight}px`;
  typeChartEl.style.minHeight = `${typeChartHeight}px`;

  Plotly.newPlot('summary-type-chart', [{
    x: orderedTypeEntries.map(([, count]) => count),
    y: orderedTypeEntries.map(([label]) => label),
    type: 'bar',
    orientation: 'h',
    text: orderedTypeEntries.map(([, count]) => count),
    textposition: 'outside',
    cliponaxis: false,
    marker: {
      color: '#2f81f7',
      line: { color: '#161b22', width: 1.5 },
    },
    hovertemplate: '%{y}: %{x}<extra></extra>',
  }], { paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    font: { color: '#e6edf3', size: 11 }, margin: { t: 10, b: 24, l: 140, r: 48 },
    xaxis: { color: '#8b949e', title: 'Count', gridcolor: 'rgba(139,148,158,0.18)' },
    yaxis: { color: '#8b949e', automargin: true },
    bargap: 0.18,
    showlegend: false
  }, { responsive: true });

  // Band bar chart
  const bands = summary.bands || {};
  Plotly.newPlot('summary-band-chart', [{
    x: Object.keys(bands), y: Object.values(bands),
    type: 'bar', marker: { color: '#bc8cff' }
  }], { paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    font: { color: '#e6edf3', size: 11 }, margin: { t: 10, b: 30, l: 40, r: 10 },
    xaxis: { color: '#8b949e' }, yaxis: { color: '#8b949e', title: 'Count' }
  }, { responsive: true });

  const queueEl = document.getElementById('review-queue-list');
  if (!reviewQueue.length) {
    queueEl.innerHTML = '<p style="color:var(--muted);">No files currently need review.</p>';
  } else {
    queueEl.innerHTML = reviewQueue.map(item => `
      <div class="file-item" onclick="selectFile('${esc(item.filename)}')" style="margin-bottom:8px;">
        <div class="name">${esc(item.filename)}</div>
        <div class="meta">
          <span class="badge badge-type">${esc(item.antenna_type || 'unknown')}</span>
          <span class="badge badge-conf">${((item.confidence || 0)*100).toFixed(0)}%</span>
          ${(item.review_reasons || []).map(reason => `<span class="badge badge-band">${esc(reason.replace(/_/g, ' '))}</span>`).join('')}
        </div>
      </div>
    `).join('');
  }
}

function setMainView(mode) {
  const welcome = document.getElementById('welcome');
  const detail = document.getElementById('detail-view');
  const lab = document.getElementById('tuning-lab-view');
  welcome.style.display = mode === 'welcome' ? 'block' : 'none';
  detail.style.display = mode === 'detail' ? 'block' : 'none';
  lab.style.display = mode === 'lab' ? 'block' : 'none';
}

function setWorkspaceMode(mode) {
  const container = document.getElementById('app-container');
  const browseTab = document.getElementById('workspace-tab-browse');
  const labTab = document.getElementById('workspace-tab-lab');
  const isLab = mode === 'lab';
  container.classList.toggle('mode-lab', isLab);
  container.classList.toggle('mode-browse', !isLab);
  browseTab.classList.toggle('active', !isLab);
  labTab.classList.toggle('active', isLab);
  if (isLab) {
    setMainView('lab');
  } else if (activeFile || activeUserAntenna) {
    setMainView('detail');
  } else {
    setMainView('welcome');
  }
}

async function loadTuningLabCatalog() {
  if (tuningLabExercises.length) return;
  const resp = await fetch(`${BASE_URL}/api/tuning-lab/exercises`).then(r => r.json());
  tuningLabExercises = resp.exercises || [];
}

async function openTuningLab(exerciseId) {
  activeFile = null;
  activeUserAntenna = null;
  applyFilters();
  renderMyAntennaList();
  setWorkspaceMode('lab');
  const view = document.getElementById('tuning-lab-view');
  view.innerHTML = '<div style="padding:40px;text-align:center;"><div class="spinner"></div> Loading tuning exercises...</div>';
  await loadTuningLabCatalog();
  if (!activeTuningExercise || exerciseId) {
    await selectTuningExercise(exerciseId || tuningLabExercises[0]?.id);
    return;
  }
  renderTuningLab();
}

async function selectTuningExercise(exerciseId) {
  if (!exerciseId) return;
  setWorkspaceMode('lab');
  clearScheduledTuningRun();
  tuningLabRunCounter += 1;
  tuningLabIsRunning = false;
  tuningLabRunStatus = 'idle';
  tuningLabAppliedValues = {};
  tuningLabLastRunAt = '';
  activeTuningResult = null;
  const detail = await fetch(`${BASE_URL}/api/tuning-lab/exercises/${encodeURIComponent(exerciseId)}`).then(r => r.json());
  activeTuningExercise = detail;
  tuningLabPatternType = getExerciseDefaultPatternType(detail);
  tuningLabPatternTypeManual = false;
  tuningLabValues = { ...(detail.starter_values || {}) };
  renderTuningLab(true);
  await runTuningExercise();
}

function resetTuningExercise() {
  if (!activeTuningExercise) return;
  if (!tuningLabPatternTypeManual) {
    tuningLabPatternType = getExerciseDefaultPatternType();
  }
  tuningLabValues = { ...(activeTuningExercise.starter_values || {}) };
  renderTuningLab();
  scheduleTuningExerciseRun('preset', true);
}

function loadTuningReferencePreset() {
  if (!activeTuningExercise) return;
  if (!tuningLabPatternTypeManual) {
    tuningLabPatternType = getExerciseDefaultPatternType();
  }
  tuningLabValues = { ...(activeTuningExercise.reference_values || {}) };
  renderTuningLab();
  scheduleTuningExerciseRun('reference', true);
}

function updateTuningControl(controlId, rawValue) {
  const control = (activeTuningExercise?.controls || []).find(item => item.id === controlId);
  tuningLabValues[controlId] = Number(rawValue);
  document.querySelectorAll(`[data-lab-value="${controlId}"]`).forEach(el => {
    el.textContent = formatTuningValue(controlId, Number(rawValue));
  });
  if (control?.type === 'checkbox') {
    renderTuningLab();
  }
  tuningLabRunStatus = tuningLabIsRunning ? 'running' : 'pending';
  syncTuningLiveStatus();
  scheduleTuningExerciseRun('live');
}

function clearScheduledTuningRun() {
  if (tuningLabDebounceHandle) {
    clearTimeout(tuningLabDebounceHandle);
    tuningLabDebounceHandle = null;
  }
}

function normalizedTuningValues(values = tuningLabValues) {
  const normalized = {};
  (activeTuningExercise?.controls || []).forEach(control => {
    normalized[control.id] = Number(values[control.id] ?? control.default);
  });
  return normalized;
}

function shouldShowTuningControl(control) {
  const revealControlId = control?.reveal_control_id;
  const revealControlMinValue = Number(control?.reveal_control_min_value);
  if (revealControlId && isFinite(revealControlMinValue)) {
    const sourceControl = (activeTuningExercise?.controls || []).find(item => item.id === revealControlId);
    const revealControlValue = Number(tuningLabValues[revealControlId] ?? sourceControl?.default ?? 0);
    const currentValue = Number(tuningLabValues[control.id] ?? control.default);
    const defaultValue = Number(control.default);
    if (currentValue !== defaultValue) {
      return true;
    }
    if (revealControlValue < revealControlMinValue) {
      return false;
    }
  }
  const revealAnalysisFlag = control?.reveal_analysis_flag;
  if (revealAnalysisFlag) {
    const currentValue = Number(tuningLabValues[control.id] ?? control.default);
    const defaultValue = Number(control.default);
    if (currentValue !== defaultValue) {
      return true;
    }
    if (!Boolean(activeTuningResult?.current?.analysis?.[revealAnalysisFlag])) {
      return false;
    }
  }
  const revealMax = Number(control?.reveal_reactance_abs_max);
  if (!isFinite(revealMax)) {
    return true;
  }
  const currentValue = Number(tuningLabValues[control.id] ?? control.default);
  const defaultValue = Number(control.default);
  if (currentValue !== defaultValue) {
    return true;
  }
  const reactance = Number(activeTuningResult?.current?.analysis?.reactance_ohm);
  return isFinite(reactance) && Math.abs(reactance) <= revealMax;
}

function visibleTuningControls() {
  return (activeTuningExercise?.controls || []).filter(control => shouldShowTuningControl(control));
}

function tuningValuesEqual(left = {}, right = {}) {
  return (activeTuningExercise?.controls || []).every(control => {
    const fallback = Number(control.default);
    return Number(left[control.id] ?? fallback) === Number(right[control.id] ?? fallback);
  });
}

function hasPendingTuningChanges() {
  if (!activeTuningExercise) return false;
  return !tuningValuesEqual(normalizedTuningValues(), tuningLabAppliedValues);
}

function scheduleTuningExerciseRun(source = 'live', immediate = false) {
  if (!activeTuningExercise) return;
  clearScheduledTuningRun();
  if (tuningLabIsRunning) {
    tuningLabRunStatus = 'pending';
    syncTuningLiveStatus();
    if (!immediate) {
      tuningLabDebounceHandle = setTimeout(() => {
        tuningLabDebounceHandle = null;
        scheduleTuningExerciseRun(source, true);
      }, TUNING_LIVE_DEBOUNCE_MS);
    }
    return;
  }
  tuningLabRunStatus = immediate ? 'running' : 'pending';
  syncTuningLiveStatus();
  if (immediate) {
    void runTuningExercise(source);
    return;
  }
  tuningLabDebounceHandle = setTimeout(() => {
    tuningLabDebounceHandle = null;
    void runTuningExercise(source);
  }, TUNING_LIVE_DEBOUNCE_MS);
}

function getTuningStatusMeta() {
  const hasTelemetry = Boolean(activeTuningResult?.current?.ok && activeTuningResult?.reference?.ok);
  if (tuningLabRunStatus === 'error') {
    return { tone: 'error', text: 'Live update failed. Try running again.' };
  }
  if (tuningLabRunStatus === 'running') {
    return { tone: 'pending', text: hasTelemetry ? 'Updating sweep and telemetry...' : 'Running first live sweep...' };
  }
  if (tuningLabRunStatus === 'pending') {
    return { tone: 'pending', text: 'Knob moved. Refreshing overlays...' };
  }
  if (hasTelemetry) {
    return { tone: 'ready', text: tuningLabLastRunAt ? `Live telemetry synced at ${tuningLabLastRunAt}` : 'Live telemetry synced' };
  }
  return { tone: '', text: 'Move a control to update the sweep.' };
}

function syncTuningLiveStatus() {
  const status = getTuningStatusMeta();
  document.querySelectorAll('[data-lab-live-status]').forEach(el => {
    el.textContent = status.text;
    el.className = `lab-status-chip ${status.tone}`.trim();
  });
  document.querySelectorAll('[data-lab-pending-style]').forEach(el => {
    el.classList.toggle('pending', tuningLabRunStatus === 'pending' || tuningLabRunStatus === 'running');
  });
}

function formatSignedValue(value, decimals, unit = '') {
  if (value == null || !isFinite(value)) return 'N/A';
  const number = Number(value);
  const prefix = number > 0 ? '+' : number < 0 ? '−' : '±';
  const absolute = Math.abs(number).toFixed(decimals);
  return `${prefix}${absolute}${unit}`;
}

function formatTuningValue(controlId, value) {
  const control = (activeTuningExercise?.controls || []).find(item => item.id === controlId);
  if (!control) return String(value);
  if (control.type === 'checkbox') {
    return Number(value) >= 0.5 ? 'On' : 'Off';
  }
  const decimals = control.step >= 1 ? 0 : control.step >= 0.1 ? 1 : control.step >= 0.01 ? 2 : 3;
  return `${Number(value).toFixed(decimals)} ${control.unit}`;
}

function tuningControlFeedbackMap(snapshot = []) {
  const byLabel = new Map((snapshot || []).map(item => [item.label, item]));
  return {
    driven_scale: byLabel.get('Driven vs reference') || null,
    reflector_scale: byLabel.get('Reflector vs reference driven') || null,
    reflector_spacing_scale: byLabel.get('Reflector spacing vs reference') || null,
    director_scale: byLabel.get('Director vs reference driven') || null,
    director_spacing_scale: byLabel.get('Director spacing vs reference') || null,
    hairpin_match_scale: byLabel.get('Hairpin match vs reference') || null,
  };
}

function setTuningLabPatternType(type) {
  if (type !== 'elevation' && type !== 'azimuth') return;
  tuningLabPatternType = type;
  tuningLabPatternTypeManual = true;
  renderTuningLab();
}

async function loadTuningLabPatternView() {
  if (!activeTuningExercise || !activeTuningResult?.current?.ok) return;
  const plotEl = document.getElementById('lab-plot-pattern');
  if (!plotEl) return;

  const requestId = ++tuningLabPatternRequestCounter;
  const currentValues = activeTuningResult.current_values || normalizedTuningValues();
  Plotly.purge(plotEl);
  plotEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);"><div class="spinner"></div> Loading ' + esc(tuningLabPatternType) + ' pattern...</div>';
  try {
    const resp = await fetch(`${BASE_URL}/api/tuning-lab/exercises/${encodeURIComponent(activeTuningExercise.id)}/pattern?type=${tuningLabPatternType}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: currentValues }),
    }).then(r => r.json());
    if (requestId !== tuningLabPatternRequestCounter) {
      return;
    }
    const pat = resp.radiation_pattern;
    if (pat?.theta?.length) {
      _lastTuningLabPatData = pat;
      plotEl.innerHTML = '';
      await renderRadiationPattern(pat, null, { plotId: 'lab-plot-pattern', dynamicRangeId: 'lab-dr-range', patternType: tuningLabPatternType });
      return;
    }
    plotEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">No radiation pattern data available</div>';
  } catch (err) {
    if (requestId !== tuningLabPatternRequestCounter) {
      return;
    }
    plotEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--red);">Failed to load pattern: ' + esc(err.message) + '</div>';
  }
}

function reRenderTuningLabPattern() {
  if (_lastTuningLabPatData?.theta?.length) {
    renderRadiationPattern(_lastTuningLabPatData, null, {
      plotId: 'lab-plot-pattern',
      dynamicRangeId: 'lab-dr-range',
      patternType: tuningLabPatternType,
    });
  }
}

async function loadTuningLab3DView() {
  if (!activeTuningExercise || !activeTuningResult?.current?.ok) return;
  const container = document.getElementById('lab-viewer3d-container');
  if (!container) return;

  if (!window.Viewer3D) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);"><div class="spinner"></div> Loading 3D engine...</div>';
    await new Promise(r => { const iv = setInterval(() => { if (window.Viewer3D) { clearInterval(iv); r(); }}, 200); });
  }

  const requestId = ++tuningLab3DRequestCounter;
  const currentValues = activeTuningResult.current_values || normalizedTuningValues();
  container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);"><div class="spinner"></div> Loading geometry...</div>';
  try {
    const geo = await fetch(`${BASE_URL}/api/tuning-lab/exercises/${encodeURIComponent(activeTuningExercise.id)}/geometry`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: currentValues }),
    }).then(r => r.json());
    if (requestId !== tuningLab3DRequestCounter) {
      return;
    }
    container.innerHTML = '';
    window.Viewer3D.init('lab-viewer3d-container', geo);
  } catch (err) {
    if (requestId !== tuningLab3DRequestCounter) {
      return;
    }
    container.innerHTML = `<div style="color:var(--red);padding:12px;">Failed to load 3D view: ${esc(err.message)}</div>`;
  }
}

async function runTuningExercise() {
  if (!activeTuningExercise) return;
  clearScheduledTuningRun();
  const runValues = normalizedTuningValues();
  const requestId = ++tuningLabRunCounter;
  tuningLabIsRunning = true;
  tuningLabRunStatus = 'running';
  if (!activeTuningResult) {
    renderTuningLab(true);
  } else {
    syncTuningLiveStatus();
  }
  try {
    const resp = await fetch(`${BASE_URL}/api/tuning-lab/exercises/${encodeURIComponent(activeTuningExercise.id)}/simulate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: runValues }),
    }).then(r => r.json());
    if (requestId !== tuningLabRunCounter) {
      return;
    }
    activeTuningResult = resp;
    tuningLabAppliedValues = runValues;
    tuningLabLastRunAt = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    tuningLabRunStatus = 'synced';
    tuningLabIsRunning = false;
    renderTuningLab();
    if (hasPendingTuningChanges()) {
      scheduleTuningExerciseRun('live', true);
    }
  } catch (error) {
    if (requestId !== tuningLabRunCounter) {
      return;
    }
    tuningLabIsRunning = false;
    tuningLabRunStatus = 'error';
    if (!activeTuningResult) {
      activeTuningResult = { current: { ok: false, error: error?.message || 'request failed' } };
      renderTuningLab();
    } else {
      syncTuningLiveStatus();
    }
  }
}

function renderTuningPlots(result) {
  const currentSwr = result.current?.swr_sweep;
  const refSwr = result.reference?.swr_sweep;
  const currentImp = result.current?.impedance_sweep;
  const refImp = result.reference?.impedance_sweep;
  const plotStyle = { paper_bgcolor: 'transparent', plot_bgcolor: '#0d1117', font: { color: '#e6edf3', size: 11 }, margin: { t: 10, b: 40, l: 50, r: 20 } };
  const axStyle = { gridcolor: '#21262d', zerolinecolor: '#30363d' };

  if (currentSwr?.freq_mhz?.length > 1 && refSwr?.freq_mhz?.length > 1) {
    const allSwr = [...currentSwr.swr, ...refSwr.swr].filter(v => isFinite(v));
    const minSwr = Math.min(...allSwr);
    const maxSwr = Math.max(...allSwr);
    const yMax = minSwr > 10 ? maxSwr * 1.1 : Math.min(10, maxSwr);
    Plotly.newPlot('lab-plot-swr', [
      { x: refSwr.freq_mhz, y: refSwr.swr, type: 'scatter', mode: 'lines', name: 'Reference', line: { color: '#8b949e', width: 2, dash: 'dash' } },
      { x: currentSwr.freq_mhz, y: currentSwr.swr, type: 'scatter', mode: 'lines', name: 'Current', line: { color: '#58a6ff', width: 2 } },
      { x: currentSwr.freq_mhz, y: currentSwr.freq_mhz.map(() => 2), type: 'scatter', mode: 'lines', name: '2:1', line: { color: '#f85149', width: 1, dash: 'dot' } },
    ], { ...plotStyle, xaxis: { title: 'Frequency (MHz)', ...axStyle }, yaxis: { title: 'SWR', ...axStyle, rangemode: 'tozero', range: [0, yMax] }, legend: { x: 1, xanchor: 'right', y: 1 } }, { responsive: true });
  }

  if (currentImp?.freq_mhz?.length > 1 && refImp?.freq_mhz?.length > 1) {
    Plotly.newPlot('lab-plot-impedance', [
      { x: refImp.freq_mhz, y: refImp.r, type: 'scatter', mode: 'lines', name: 'Reference R', line: { color: '#3fb950', width: 2, dash: 'dash' } },
      { x: refImp.freq_mhz, y: refImp.x, type: 'scatter', mode: 'lines', name: 'Reference X', line: { color: '#d29922', width: 2, dash: 'dash' } },
      { x: currentImp.freq_mhz, y: currentImp.r, type: 'scatter', mode: 'lines', name: 'Current R', line: { color: '#3fb950', width: 2 } },
      { x: currentImp.freq_mhz, y: currentImp.x, type: 'scatter', mode: 'lines', name: 'Current X', line: { color: '#d29922', width: 2 } },
      { x: currentImp.freq_mhz, y: currentImp.freq_mhz.map(() => 0), type: 'scatter', mode: 'lines', name: '0 Ω', line: { color: '#30363d', width: 1, dash: 'dot' } },
    ], { ...plotStyle, xaxis: { title: 'Frequency (MHz)', ...axStyle }, yaxis: { title: 'Ohms', ...axStyle }, legend: { x: 1, xanchor: 'right', y: 1 } }, { responsive: true });
  }
}

}

function updateReviewReferenceCatalog(catalogReferences, selectedReferences) {
  const el = document.getElementById('review-reference-options');
  if (!el) return;
  const selectedIds = new Set((selectedReferences || [])
    .map(ref => ref.reference_id)
    .filter(id => id != null)
    .map(id => String(id)));
  if (!catalogReferences.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:13px;">No catalog references for this antenna type yet. Save additional URLs below to seed the catalog.</div>';
    return;
  }
  el.innerHTML = catalogReferences.map(ref => `
    <label style="display:flex;gap:10px;align-items:flex-start;cursor:pointer;">
      <input type="checkbox" class="review-reference-checkbox" value="${esc(ref.id)}" ${selectedIds.has(String(ref.id)) ? 'checked' : ''}>
      <span>
        <a href="${esc(ref.url)}" target="_blank" rel="noopener noreferrer">${esc(ref.title || ref.url)}</a>
        ${ref.note ? `<div style="color:var(--muted);font-size:12px;">${esc(ref.note)}</div>` : ''}
      </span>
    </label>
  `).join('');
}

async function refreshReviewReferenceCatalog(antennaType) {
  const el = document.getElementById('review-reference-options');
  if (!el) return;
  if (!antennaType) {
    updateReviewReferenceCatalog([], []);
    return;
  }
  el.innerHTML = '<div style="color:var(--muted);font-size:13px;">Loading references...</div>';
  try {
    const resp = await fetch(`${BASE_URL}/api/reference-catalog?antenna_type=${encodeURIComponent(antennaType)}`);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
    updateReviewReferenceCatalog(data.references || [], []);
  } catch (err) {
    el.innerHTML = `<div style="color:var(--red);font-size:13px;">Failed to load references: ${esc(err.message)}</div>`;
  }
}

async function saveClassificationReview(filename) {
  const status = document.getElementById('review-status');
  const saveBtn = document.getElementById('review-save');
  const reviewedType = document.getElementById('review-type').value || null;
  const reason = document.getElementById('review-reason').value;
  const referenceIds = Array.from(document.querySelectorAll('.review-reference-checkbox:checked'))
    .map(el => parseInt(el.value, 10))
    .filter(Number.isFinite);
  const references = document.getElementById('review-refs').value
    .split('\n')
    .map(s => s.trim())
    .filter(Boolean)
    .map(url => ({ url }));
  saveBtn.disabled = true;
  status.textContent = 'Saving review...';
  try {
    const resp = await fetch(`${BASE_URL}/api/review/${encodeURIComponent(filename)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        reviewed_antenna_type: reviewedType,
        reason,
        reference_ids: referenceIds,
        references,
      }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    await refreshCatalog();
    renderDetail(data);
    load3DView(filename);
    status.textContent = 'Review saved';
  } catch (e) {
    status.textContent = `Failed: ${e.message}`;
  } finally {
    saveBtn.disabled = false;
  }
}

function clearClassificationReview(filename) {
  const reviewType = document.getElementById('review-type');
  const reviewReason = document.getElementById('review-reason');
  reviewType.value = '';
  reviewReason.value = '';
  document.querySelectorAll('.review-reference-checkbox').forEach(el => { el.checked = false; });
  document.getElementById('review-refs').value = '';
  return saveClassificationReview(filename);
}

function switchTab(tabEl) {
  const parent = tabEl.closest('.main') || document.getElementById('detail-view');
  parent.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  parent.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  document.getElementById(tabEl.dataset.tab).classList.add('active');
  if (tabEl.dataset.tab === 'tab-3d' && activeFile) load3DView(activeFile);
  if (tabEl.dataset.tab === 'tab-sim' && activeFile) loadSimulation(activeFile);
}

// ---- Simulation ----
let _simLoadedFile = null;

async function loadSimulation(filename) {
  if (_simLoadedFile === filename) return;
  _simLoadedFile = filename;

  const loading = document.getElementById('sim-loading');
  const errEl = document.getElementById('sim-error');
  const content = document.getElementById('sim-content');
  loading.style.display = 'block';
  errEl.style.display = 'none';
  content.style.display = 'none';

  try {
    // Run full 3D pattern, frequency sweep, and geometry fetch in parallel
    const [patResp, sweepResp, geoResp] = await Promise.all([
      fetch(`${BASE_URL}/api/pattern/${encodeURIComponent(filename)}?type=full`, { method: 'POST' }).then(r => r.json()),
      fetch(`${BASE_URL}/api/sweep/${encodeURIComponent(filename)}`, { method: 'POST' }).then(r => r.json()),
      fetch(`${BASE_URL}/api/geometry/${encodeURIComponent(filename)}`).then(r => r.json()).catch(() => null),
    ]);
    loading.style.display = 'none';

    // Check for total failure
    if (!patResp.ok && !sweepResp.ok) {
      let msg = patResp.error || sweepResp.error || 'Unknown error';
      let html = `<div style="color:var(--red);padding:12px;background:var(--surface);border-radius:8px;"><strong>Simulation failed:</strong> ${esc(msg)}`;
      if (patResp.error === 'nec_failed' && patResp.stderr) {
        html += `<pre style="margin-top:8px;color:var(--muted);font-size:12px;white-space:pre-wrap;max-height:200px;overflow:auto">${esc(patResp.stderr)}</pre>`;
      }
      if (patResp.error === 'nec_failed') {
        html += `<div style="margin-top:8px;color:var(--muted);font-size:12px;">This file may use NEC-4 features or syntax not supported by nec2c.</div>`;
      }
      html += '</div>';
      errEl.innerHTML = html;
      errEl.style.display = 'block';
      _simLoadedFile = null;
      return;
    }

    // Use sweep data for SWR/impedance (multi-point), pattern data for radiation
    const sweepData = sweepResp.ok ? sweepResp : patResp;
    const patData = patResp.ok ? patResp : null;
    renderSimulation(sweepData, patData, geoResp);
    content.style.display = 'block';
  } catch (err) {
    loading.style.display = 'none';
    errEl.innerHTML = `<div style="color:var(--red);padding:12px;background:var(--surface);border-radius:8px;">Error: ${esc(err.message)}. Is the nec-solver container running?</div>`;
    errEl.style.display = 'block';
    _simLoadedFile = null;
  }
}

function renderSimulation(sweepData, patData, geoData) {
  // Summary stats
  const stats = [];
  const swr = sweepData.swr_sweep;
  const imp = sweepData.impedance_sweep;
  const pat = patData?.radiation_pattern;

  if (swr) {
    stats.push({ label: 'Design Freq', value: swr.design_freq_mhz ? swr.design_freq_mhz.toFixed(2)+' MHz' : 'N/A' });
    stats.push({ label: 'Min SWR', value: swr.min_swr != null ? swr.min_swr.toFixed(2) : 'N/A' });
    stats.push({ label: 'SWR Dip', value: swr.resonant_freq_mhz ? swr.resonant_freq_mhz.toFixed(2)+' MHz' : 'N/A' });
    stats.push({ label: '2:1 BW', value: swr.bandwidth_2to1_mhz ? swr.bandwidth_2to1_mhz.toFixed(2)+' MHz' : 'N/A' });
  }
  if (pat) {
    stats.push({ label: 'Max Gain', value: pat.max_gain_dbi != null ? pat.max_gain_dbi.toFixed(2)+' dBi' : 'N/A' });
    stats.push({ label: 'F/B Ratio', value: pat.front_to_back_db != null ? pat.front_to_back_db.toFixed(1)+' dB' : 'N/A' });
  }

  const hasUsablePattern = !!(pat?.gain_db?.some(g => g > -900));

  const statsEl = document.getElementById('sim-summary-stats');
  statsEl.innerHTML = stats.map(s => `
    <div class="sim-stat"><div class="label">${s.label}</div><div class="value">${s.value}</div></div>
  `).join('');

  const insightsEl = document.getElementById('sim-sweep-insights');
  if (insightsEl) {
    const dips = (swr && Array.isArray(swr.dips)) ? swr.dips : [];
    if (dips.length) {
      insightsEl.style.display = 'block';
      insightsEl.innerHTML = `
        <h4>Sweep Dips</h4>
        <div class="sim-dip-list">
          ${dips.map(dip => {
            const classes = ['sim-dip-chip'];
            if (dip.is_global_min) classes.push('best');
            if (dip.is_nearest_design) classes.push('nearest');
            const notes = [];
            if (dip.is_global_min) notes.push('best SWR');
            if (dip.is_nearest_design) notes.push('nearest design');
            if (dip.distance_from_design_mhz != null) notes.push('Δ ' + Number(dip.distance_from_design_mhz).toFixed(2) + ' MHz');
            return `
              <div class="${classes.join(' ')}">
                <strong>${Number(dip.freq_mhz).toFixed(2)} MHz</strong>
                <span>SWR ${Number(dip.swr).toFixed(2)}</span>
                <span>${notes.join(' · ') || 'local minimum'}</span>
              </div>
            `;
          }).join('')}
        </div>
      `;
    } else {
      insightsEl.style.display = 'none';
      insightsEl.innerHTML = '';
    }
  }

  _lastGeoData = geoData;
  _lastPatData = pat;

  requestAnimationFrame(() => {
    const plotStyle = { paper_bgcolor: 'transparent', plot_bgcolor: '#0d1117', font: { color: '#e6edf3', size: 11 }, margin: { t: 10, b: 40, l: 50, r: 20 } };
    const axStyle = { gridcolor: '#21262d', zerolinecolor: '#30363d' };

    // SWR plot
    const swrEl = document.getElementById('plot-swr');
    if (swr?.freq_mhz?.length > 1) {
      const finiteSwr = swr.swr.filter(v => isFinite(v));
      const minSwr = Math.min(...finiteSwr);
      const maxSwr = Math.max(...finiteSwr);
      // If all SWR values exceed 10, show full range; otherwise cap at 10
      const yMax = minSwr > 10 ? maxSwr * 1.1 : Math.min(10, maxSwr);
      Plotly.newPlot('plot-swr', [
        { x: swr.freq_mhz, y: swr.swr, type: 'scatter', mode: 'lines', name: 'SWR', line: { color: '#58a6ff', width: 2 } },
        { x: swr.freq_mhz, y: swr.freq_mhz.map(() => 2), type: 'scatter', mode: 'lines', name: '2:1', line: { color: '#f85149', width: 1, dash: 'dash' } },
      ], { ...plotStyle, xaxis: { title: 'Frequency (MHz)', ...axStyle }, yaxis: { title: 'SWR', ...axStyle, rangemode: 'tozero', range: [0, yMax] }, showlegend: true, legend: { x: 1, xanchor: 'right', y: 1 } }, { responsive: true });
    } else if (swr?.freq_mhz?.length === 1) {
      swrEl.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);">Single frequency: SWR = ${swr.swr[0]?.toFixed(2) ?? 'N/A'} at ${swr.freq_mhz[0]} MHz</div>`;
    } else {
      swrEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">No SWR data available</div>';
    }

    // Impedance plot
    const impEl = document.getElementById('plot-impedance');
    if (imp?.freq_mhz?.length > 1) {
      Plotly.newPlot('plot-impedance', [
        { x: imp.freq_mhz, y: imp.r, type: 'scatter', mode: 'lines', name: 'R (\u03A9)', line: { color: '#3fb950', width: 2 } },
        { x: imp.freq_mhz, y: imp.x, type: 'scatter', mode: 'lines', name: 'X (\u03A9)', line: { color: '#d29922', width: 2 } },
        { x: imp.freq_mhz, y: imp.freq_mhz.map(() => 0), type: 'scatter', mode: 'lines', name: '0\u03A9', line: { color: '#30363d', width: 1, dash: 'dot' }, showlegend: false },
      ], { ...plotStyle, xaxis: { title: 'Frequency (MHz)', ...axStyle }, yaxis: { title: 'Ohms', ...axStyle }, showlegend: true, legend: { x: 1, xanchor: 'right', y: 1 } }, { responsive: true });
    } else if (imp?.freq_mhz?.length === 1) {
      impEl.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);">Single frequency: Z = ${imp.r[0]?.toFixed(1) ?? '?'} ${imp.x[0] >= 0 ? '+' : ''}${imp.x[0]?.toFixed(1) ?? '?'}j \u03A9 at ${imp.freq_mhz[0]} MHz</div>`;
    } else {
      impEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">No impedance data available</div>';
    }

    // Radiation pattern (always full 3D hemisphere)
    const patEl = document.getElementById('plot-pattern');
    // Highlight 3D button since we default to full 3D pattern
    document.querySelectorAll('.pat-btn').forEach(b => b.classList.toggle('active', b.textContent === '3D'));
    if (pat?.theta?.length) {
      if (hasUsablePattern) {
        renderRadiationPattern(pat, geoData);
      } else {
        patEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">No valid gain data \u2014 try forcing a pattern with the buttons above.</div>';
      }
    } else {
      patEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">No radiation pattern \u2014 file may lack an RP card. Use the buttons above to force a pattern.</div>';
    }
  });
}

function renderRadiationPattern(pat, geoData, options = {}) {
  const plotId = options.plotId || 'plot-pattern';
  const dynamicRangeId = options.dynamicRangeId || 'dr-range';
  const plotEl = document.getElementById(plotId);
  const requestedPatternType = options.patternType || plotEl?.dataset.patternType || null;
  if (plotEl) {
    if (requestedPatternType) {
      plotEl.dataset.patternType = requestedPatternType;
    } else {
      delete plotEl.dataset.patternType;
    }
  }
  const uniqueTheta = [...new Set(pat.theta)].sort((a,b) => a-b);
  const uniquePhi = [...new Set(pat.phi)].sort((a,b) => a-b);
  const colors = ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff'];
  const isAzimuthPattern = requestedPatternType === 'azimuth'
    || (!requestedPatternType && uniqueTheta.length <= 3 && uniquePhi.length > 10);
  const isElevationPattern = requestedPatternType === 'elevation'
    || (!requestedPatternType && uniquePhi.length <= 10 && uniqueTheta.length > 10);
  const polarLayout = {
    paper_bgcolor: 'transparent', plot_bgcolor: '#0d1117',
    font: { color: '#e6edf3', size: 11 },
    polar: {
      bgcolor: '#0d1117',
      angularaxis: { gridcolor: '#21262d', linecolor: '#30363d', direction: 'clockwise' },
      radialaxis: { gridcolor: '#21262d', linecolor: '#30363d', angle: 45, title: { text: 'dB' } },
    },
    showlegend: true, legend: { x: 1, xanchor: 'right', y: 1 },
    margin: { t: 30, b: 20, l: 40, r: 40 },
  };

  // Determine pattern type: azimuth (many phi, few theta) or elevation (many theta, few phi)
  if (isAzimuthPattern) {
    // Azimuth pattern — gain vs phi at fixed theta
    const traces = [];
    uniqueTheta.forEach((theta, idx) => {
      const phis = [], gains = [];
      for (let i = 0; i < pat.theta.length; i++) {
        if (pat.theta[i] === theta) {
          phis.push(pat.phi[i]);
          gains.push(pat.gain_db[i]);
        }
      }
      const validGains = gains.filter(g => g > -900);
      if (!validGains.length) return;
      const drVal = parseInt(document.getElementById(dynamicRangeId)?.value || '40', 10);
      const rawMin = Math.min(...validGains);
      const maxG = Math.max(...validGains);
      const minG = drVal > 0 ? Math.max(rawMin, maxG - drVal) : rawMin;
      const shifted = gains.map(g => g > -900 ? Math.max(0, g - minG) : 0);
      traces.push({
        type: 'scatterpolar', mode: 'lines',
        r: shifted, theta: phis,
        name: `\u03B8=${theta}°`,
        line: { color: colors[idx % colors.length], width: 2 },
      });
    });
    polarLayout.title = { text: 'Azimuth Polar Pattern', font: { color: '#8b949e', size: 12 } };
    return Plotly.newPlot(plotId, traces, polarLayout, { responsive: true });

  } else if (isElevationPattern) {
    // Elevation cuts — gain vs theta at selected phi values
    const byPhi = {};
    for (let i = 0; i < pat.theta.length; i++) {
      const phi = pat.phi[i];
      if (!byPhi[phi]) byPhi[phi] = { theta: [], gain: [] };
      byPhi[phi].theta.push(pat.theta[i]);
      byPhi[phi].gain.push(pat.gain_db[i]);
    }
    // Select phi cuts: prefer 0, 90, 180, 270
    let selectedPhis = uniquePhi.slice(0, 4);
    for (const preferred of [0, 90, 180, 270]) {
      if (uniquePhi.includes(preferred) && !selectedPhis.includes(preferred)) {
        selectedPhis.push(preferred);
      }
    }
    selectedPhis = [...new Set(selectedPhis)].sort((a,b) => a-b).slice(0, 4);

    const traces = [];
    selectedPhis.forEach((phi, idx) => {
      const d = byPhi[phi];
      const validGains = d.gain.filter(g => g > -900);
      if (!validGains.length) return;
      const drVal = parseInt(document.getElementById(dynamicRangeId)?.value || '40', 10);
      const rawMin = Math.min(...validGains);
      const maxG = Math.max(...validGains);
      const minG = drVal > 0 ? Math.max(rawMin, maxG - drVal) : rawMin;
      const shifted = d.gain.map(g => g > -900 ? Math.max(0, g - minG) : 0);
      traces.push({
        type: 'scatterpolar', mode: 'lines',
        r: shifted, theta: d.theta,
        name: `\u03C6=${phi}°`,
        line: { color: colors[idx % colors.length], width: 2 },
      });
    });
    polarLayout.title = { text: 'Elevation Pattern', font: { color: '#8b949e', size: 12 } };
    return Plotly.newPlot(plotId, traces, polarLayout, { responsive: true });

  } else {
    // Full 3D grid — render as 3D surface in Cartesian coordinates
    // Build gain matrix [theta_idx][phi_idx]
    const thetaMap = new Map(); uniqueTheta.forEach((v,i) => thetaMap.set(v,i));
    const phiMap = new Map(); uniquePhi.forEach((v,i) => phiMap.set(v,i));
    const nT = uniqueTheta.length, nP = uniquePhi.length;
    const gainMatrix = Array.from({length: nT}, () => new Float64Array(nP));
    for (let k = 0; k < pat.theta.length; k++) {
      const ti = thetaMap.get(pat.theta[k]), pi = phiMap.get(pat.phi[k]);
      if (ti !== undefined && pi !== undefined) gainMatrix[ti][pi] = pat.gain_db[k];
    }
    // Clamp gain floor to user-selected dynamic range
    const drVal = parseInt(document.getElementById(dynamicRangeId)?.value || '40', 10);
    let maxG = -Infinity, rawMinG = Infinity;
    for (let i = 0; i < nT; i++) for (let j = 0; j < nP; j++) {
      const v = gainMatrix[i][j];
      if (v > -900) { if (v > maxG) maxG = v; if (v < rawMinG) rawMinG = v; }
    }
    const minG = drVal > 0 ? Math.max(rawMinG, maxG - drVal) : rawMinG;
    for (let i = 0; i < nT; i++) for (let j = 0; j < nP; j++) {
      if (gainMatrix[i][j] > -900 && gainMatrix[i][j] < minG) gainMatrix[i][j] = minG;
    }
    const deg = Math.PI / 180;
    const xs = [], ys = [], zs = [], colors = [];
    for (let i = 0; i < nT; i++) {
      const xr = [], yr = [], zr = [], cr = [];
      const th = uniqueTheta[i] * deg;
      for (let j = 0; j < nP; j++) {
        const g = gainMatrix[i][j] > -900 ? gainMatrix[i][j] - minG : 0;
        const r = Math.max(0, g);
        const ph = uniquePhi[j] * deg;
        xr.push(r * Math.sin(th) * Math.cos(ph));
        yr.push(r * Math.sin(th) * Math.sin(ph));
        zr.push(r * Math.cos(th));
        cr.push(gainMatrix[i][j] > -900 ? gainMatrix[i][j] : minG);
      }
      xs.push(xr); ys.push(yr); zs.push(zr); colors.push(cr);
    }
    const traces3d = [{
      type: 'surface', x: xs, y: ys, z: zs,
      surfacecolor: colors,
      colorscale: [
        [0, '#0d1117'], [0.2, '#1f6feb'], [0.4, '#58a6ff'],
        [0.6, '#3fb950'], [0.8, '#d29922'], [1, '#f85149']
      ],
      colorbar: { title: 'dBi', tickfont: { color: '#8b949e' }, titlefont: { color: '#8b949e' } },
      showscale: true,
      opacity: 0.55,
      lighting: { ambient: 0.6, diffuse: 0.5, specular: 0.2 },
    }];
    // Overlay antenna geometry if available
    if (geoData?.wires?.length) {
      // Find max pattern radius for scaling
      let maxR = 0;
      for (let i = 0; i < nT; i++) for (let j = 0; j < nP; j++) {
        const g = gainMatrix[i][j] > -900 ? gainMatrix[i][j] - minG : 0;
        if (g > maxR) maxR = g;
      }
      // Find max antenna extent
      let maxExt = 0;
      for (const w of geoData.wires) {
        for (const pt of w.points) {
          for (const c of pt) if (Math.abs(c) > maxExt) maxExt = Math.abs(c);
        }
      }
      const scale = maxExt > 0 ? (maxR * 0.25) / maxExt : 1;
      for (const w of geoData.wires) {
        const wx = [], wy = [], wz = [];
        for (const pt of w.points) {
          wx.push(pt[0] * scale);
          wy.push(pt[1] * scale);
          wz.push(pt[2] * scale);
        }
        traces3d.push({
          type: 'scatter3d', mode: 'lines',
          x: wx, y: wy, z: wz,
          line: { color: w.is_excited ? '#f0883e' : '#8b949e', width: w.is_excited ? 5 : 3 },
          name: w.is_excited ? 'Driven' : `Wire ${w.tag}`,
          showlegend: false, hoverinfo: 'name',
        });
      }
    }
    return Plotly.newPlot(plotId, traces3d, {
      paper_bgcolor: 'transparent',
      scene: {
        bgcolor: '#0d1117',
        xaxis: { title: '', showgrid: true, gridcolor: '#21262d', zerolinecolor: '#30363d', color: '#8b949e' },
        yaxis: { title: '', showgrid: true, gridcolor: '#21262d', zerolinecolor: '#30363d', color: '#8b949e' },
        zaxis: { title: '', showgrid: true, gridcolor: '#21262d', zerolinecolor: '#30363d', color: '#8b949e' },
        aspectmode: 'data',
        camera: { eye: { x: 1.5, y: 1.5, z: 0.8 } },
      },
      font: { color: '#e6edf3', size: 11 },
      title: { text: '3D Radiation Pattern', font: { color: '#8b949e', size: 12 } },
      margin: { t: 40, b: 10, l: 10, r: 10 },
    }, { responsive: true });
  }
}

// ---- Pattern re-render on dynamic range change ----
let _lastGeoData = null;
let _lastPatData = null;
function reRenderPattern() {
  if (_lastPatData?.theta?.length) renderRadiationPattern(_lastPatData, _lastGeoData);
}
async function forcePattern(type) {
  const filename = _simLoadedFile;
  if (!filename) return;
  const patEl = document.getElementById('plot-pattern');
  Plotly.purge(patEl);
  patEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);"><div class="spinner"></div> Computing ' + esc(type) + ' pattern...</div>';
  // Highlight active button
  document.querySelectorAll('.pat-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().startsWith(type.slice(0, 4))));
  try {
    const resp = await fetch(`${BASE_URL}/api/pattern/${encodeURIComponent(filename)}?type=${type}`, { method: 'POST' }).then(r => r.json());
    if (!resp.ok) {
      patEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--red);">Pattern failed: ' + esc(resp.error || 'unknown') + '</div>';
      return;
    }
    const pat = resp.radiation_pattern;
    if (pat?.theta?.length) {
      // Check for degenerate data (all gains invalid)
      const validGains = (pat.gain_db || []).filter(g => g > -900);
      if (!validGains.length) {
        patEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">No valid gain data — NEC solver could not compute radiation for this file.</div>';
        return;
      }
      _lastPatData = pat;
      patEl.innerHTML = ''; // clear spinner before Plotly render
      await renderRadiationPattern(pat, _lastGeoData, { patternType: type });
    } else {
      patEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">No pattern data returned</div>';
    }
  } catch (e) {
    patEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--red);">Error: ' + esc(e.message) + '</div>';
  }
}

// ---- 3D View ----
let _viewer3dLoaded = null; // filename currently rendered
async function load3DView(filename) {
  if (_viewer3dLoaded === filename) return;
  const container = document.getElementById('viewer3d-container');
  if (!container) return;

  if (!window.Viewer3D) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);"><div class="spinner"></div> Loading 3D engine...</div>';
    await new Promise(r => { const iv = setInterval(() => { if (window.Viewer3D) { clearInterval(iv); r(); }}, 200); });
  }

  container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);"><div class="spinner"></div> Loading geometry...</div>';
  try {
    const geo = await fetch(`${BASE_URL}/api/geometry/${encodeURIComponent(filename)}`).then(r => r.json());
    container.innerHTML = '';
    window.Viewer3D.init('viewer3d-container', geo);
    _viewer3dLoaded = filename;
    _currentsShown = false;
    _currentsCache = null;
    const btn = document.getElementById('btn-currents');
    if (btn) { btn.textContent = '\u{1f321} Show Currents'; btn.disabled = false; btn.style.display = 'block'; }
    const legend = document.getElementById('currents-legend');
    if (legend) legend.style.display = 'none';
  } catch (err) {
    container.innerHTML = `<div style="color:var(--red);padding:12px;">Failed to load 3D view: ${esc(err.message)}</div>`;
  }
}

// ---- Current overlay toggle ----
let _currentsShown = false;
let _currentsCache = null;

async function toggleCurrentOverlay() {
  if (!window.Viewer3D || !_viewer3dLoaded) return;
  const btn = document.getElementById('btn-currents');

  const legend = document.getElementById('currents-legend');
  if (_currentsShown) {
    window.Viewer3D.clearCurrents();
    _currentsShown = false;
    if (btn) btn.textContent = '\u{1f321} Show Currents';
    if (legend) legend.style.display = 'none';
    return;
  }

  if (btn) { btn.textContent = '\u23f3 Loading...'; btn.disabled = true; }
  try {
    if (!_currentsCache) {
      const resp = await fetch(`${BASE_URL}/api/currents/${encodeURIComponent(_viewer3dLoaded)}`, { method: 'POST' });
      _currentsCache = await resp.json();
    }
    if (_currentsCache.ok) {
      window.Viewer3D.showCurrents(_currentsCache);
      _currentsShown = true;
      if (btn) btn.textContent = '\u{1f321} Hide Currents';
      if (legend) legend.style.display = 'block';
    } else {
      if (btn) btn.textContent = '\u274c No currents';
      setTimeout(() => { if (btn) btn.textContent = '\u{1f321} Show Currents'; }, 2000);
    }
  } catch (err) {
    console.warn('Current overlay failed:', err);
    if (btn) btn.textContent = '\u274c Error';
    setTimeout(() => { if (btn) btn.textContent = '\u{1f321} Show Currents'; }, 2000);
  }
  if (btn) btn.disabled = false;
}

function switchUserTab(tabEl) {
  const parent = document.getElementById('detail-view');
  parent.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  parent.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  document.getElementById(tabEl.dataset.tab).classList.add('active');
  if (tabEl.dataset.tab === 'tab-user-3d' && activeUserAntenna) loadUser3D(activeUserAntenna);
  if (tabEl.dataset.tab === 'tab-user-sim' && activeUserAntenna) loadUserSim(activeUserAntenna);
