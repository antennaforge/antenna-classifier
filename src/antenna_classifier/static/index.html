let _userSimLoaded = null;
let _userCurrentsShown = false;
let _userCurrentsCache = null;

async function loadUser3D(id) {
  const container = document.getElementById('viewer3d-container');
  if (!container) return;
  if (!window.Viewer3D) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);"><div class="spinner"></div> Loading 3D engine...</div>';
    await new Promise(r => { const iv = setInterval(() => { if (window.Viewer3D) { clearInterval(iv); r(); }}, 200); });
  }
  container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);"><div class="spinner"></div> Loading geometry...</div>';
  try {
    const geo = await fetch(`${BASE_URL}/api/my-antennas/${id}/geometry`).then(r => r.json());
    container.innerHTML = '';
    window.Viewer3D.init('viewer3d-container', geo);
    _userCurrentsShown = false;
    _userCurrentsCache = null;
    const btn = document.getElementById('btn-user-currents');
    if (btn) { btn.textContent = '\u{1f321} Show Currents'; btn.disabled = false; btn.style.display = 'block'; }
    const legend = document.getElementById('user-currents-legend');
    if (legend) legend.style.display = 'none';
  } catch (err) {
    container.innerHTML = `<div style="color:var(--red);padding:12px;">Failed: ${esc(err.message)}</div>`;
  }
}

async function toggleUserCurrentOverlay() {
  if (!window.Viewer3D || !activeUserAntenna) return;
  const btn = document.getElementById('btn-user-currents');

  const legend = document.getElementById('user-currents-legend');
  if (_userCurrentsShown) {
    window.Viewer3D.clearCurrents();
    _userCurrentsShown = false;
    if (btn) btn.textContent = '\u{1f321} Show Currents';
    if (legend) legend.style.display = 'none';
    return;
  }

  if (btn) { btn.textContent = '\u23f3 Loading...'; btn.disabled = true; }
  try {
    if (!_userCurrentsCache) {
      const resp = await fetch(`${BASE_URL}/api/my-antennas/${activeUserAntenna}/currents`, { method: 'POST' });
      _userCurrentsCache = await resp.json();
    }
    if (_userCurrentsCache.ok) {
      window.Viewer3D.showCurrents(_userCurrentsCache);
      _userCurrentsShown = true;
      if (btn) btn.textContent = '\u{1f321} Hide Currents';
      if (legend) legend.style.display = 'block';
    } else {
      if (btn) btn.textContent = '\u274c No currents';
      setTimeout(() => { if (btn) btn.textContent = '\u{1f321} Show Currents'; }, 2000);
    }
  } catch (err) {
    console.warn('User current overlay failed:', err);
    if (btn) btn.textContent = '\u274c Error';
    setTimeout(() => { if (btn) btn.textContent = '\u{1f321} Show Currents'; }, 2000);
  }
  if (btn) btn.disabled = false;
}

async function loadUserSim(id) {
  if (_userSimLoaded === id) return;
  _userSimLoaded = id;
  const loading = document.getElementById('sim-loading');
  const errEl = document.getElementById('sim-error');
  const content = document.getElementById('sim-content');
  loading.style.display = 'block'; errEl.style.display = 'none'; content.style.display = 'none';
  try {
    const [patResp, sweepResp, geoResp] = await Promise.all([
      fetch(`${BASE_URL}/api/my-antennas/${id}/pattern?type=full`, { method: 'POST' }).then(r => r.json()),
      fetch(`${BASE_URL}/api/my-antennas/${id}/sweep`, { method: 'POST' }).then(r => r.json()),
      fetch(`${BASE_URL}/api/my-antennas/${id}/geometry`).then(r => r.json()).catch(() => null),
    ]);
    loading.style.display = 'none';
    if (!patResp.ok && !sweepResp.ok) {
      errEl.innerHTML = `<div style="color:var(--red);padding:12px;background:var(--surface);border-radius:8px;"><strong>Simulation failed:</strong> ${esc(patResp.error || sweepResp.error || 'Unknown')}</div>`;
      errEl.style.display = 'block';
      _userSimLoaded = null;
      return;
    }
    renderSimulation(sweepResp.ok ? sweepResp : patResp, patResp.ok ? patResp : null, geoResp);
    content.style.display = 'block';
  } catch (err) {
    loading.style.display = 'none';
    errEl.innerHTML = `<div style="color:var(--red);padding:12px;background:var(--surface);border-radius:8px;">Error: ${esc(err.message)}</div>`;
    errEl.style.display = 'block';
    _userSimLoaded = null;
  }
}

async function forceUserPattern(type) {
  if (!activeUserAntenna) return;
  const patEl = document.getElementById('plot-pattern');
  Plotly.purge(patEl);
  patEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);"><div class="spinner"></div> Computing ' + esc(type) + ' pattern...</div>';
  document.querySelectorAll('.pat-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().startsWith(type.slice(0, 4))));
  try {
    const resp = await fetch(`${BASE_URL}/api/my-antennas/${activeUserAntenna}/pattern?type=${type}`, { method: 'POST' }).then(r => r.json());
    if (!resp.ok) { patEl.innerHTML = '<div style="color:var(--red);padding:20px;">Failed: ' + esc(resp.error) + '</div>'; return; }
    const pat = resp.radiation_pattern;
    if (pat?.theta?.length) {
      const validGains = (pat.gain_db || []).filter(g => g > -900);
      if (!validGains.length) { patEl.innerHTML = '<div style="padding:20px;color:var(--muted);">No valid gain data</div>'; return; }
      _lastPatData = pat;
      patEl.innerHTML = ''; // clear spinner before Plotly render
      await renderRadiationPattern(pat, _lastGeoData, { patternType: type });
    }
    else patEl.innerHTML = '<div style="padding:20px;color:var(--muted);">No pattern data</div>';
  } catch (e) { patEl.innerHTML = '<div style="color:var(--red);padding:20px;">Error: ' + esc(e.message) + '</div>'; }
}

// OODA 4-square indicator HTML
const _OODA_LABELS = ['O','O','D','A'];  // Observe, Orient, Decide, Act
function _oodaHtml() {
  return '<div class="ooda-grid">' +
    _OODA_LABELS.map((l,i) => `<div class="ooda-cell" id="ooda-${i}">${l}</div>`).join('') +
    '</div><span class="ooda-detail" id="ooda-detail"></span>';
}
function _oodaSet(phase, status, detail) {
  for (let i = 0; i < 4; i++) {
    const c = document.getElementById('ooda-' + i);
    if (!c) continue;
    c.classList.remove('active', 'done');
    if (i < phase) c.classList.add('done');
    else if (i === phase) c.classList.add(status === 'ok' || status === 'skip' ? 'done' : 'active');
  }
  const d = document.getElementById('ooda-detail');
  if (d) d.textContent = detail || '';
}

function _getSelectedTunerMode() {
  return document.getElementById('create-tuner-mode')?.value || 'deterministic';
}

async function submitCreate() {
  const mode = document.getElementById('create-modal').dataset.mode;
  if (mode === 'desc') return submitDescription();
  if (mode === 'pdf') return submitPdf();
  if (mode === 'url') return submitUrl();
}

async function submitDescription() {
  const btn = document.getElementById('create-submit');
  const status = document.getElementById('create-status');
  const name = document.getElementById('desc-name').value.trim();
  if (!name) { status.innerHTML = '<span style="color:var(--red);">Name is required</span>'; return; }
  btn.disabled = true;
  status.innerHTML = _oodaHtml();
  const body = {
    name,
    antenna_type: document.getElementById('desc-type').value,
    frequency_mhz: parseFloat(document.getElementById('desc-freq').value) || 14.0,
    ground_type: document.getElementById('desc-ground').value,
    description: document.getElementById('desc-details').value,
    tuner_mode: _getSelectedTunerMode(),
  };
  try {
    const resp = await fetch(`${BASE_URL}/api/my-antennas/generate-stream`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.detail || `HTTP ${resp.status}`); }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const msg = JSON.parse(line.slice(6));
        if (msg.event === 'step') {
          _oodaSet(msg.phase, msg.status, msg.name + ': ' + (msg.detail || ''));
        } else if (msg.event === 'done') {
          status.innerHTML = '<span style="color:var(--green);">&#10003; Created!</span>';
          document.getElementById('desc-name').value = '';
          document.getElementById('desc-details').value = '';
          await _afterCreate(msg.antenna);
          return;
        } else if (msg.event === 'error') {
          throw new Error(msg.detail);
        }
      }
    }
    // Stream ended without done event — fall back
    if (!status.querySelector('.done-check')) {
      status.innerHTML = '<span style="color:var(--green);">&#10003; Created!</span>';
    }
  } catch (e) {
    status.innerHTML = `<span style="color:var(--red);">Failed: ${esc(e.message)}</span>`;
  } finally { btn.disabled = false; }
}

async function submitPdf() {
  const btn = document.getElementById('create-submit');
  const status = document.getElementById('create-status');
  const fileInput = document.getElementById('pdf-file');
  if (!fileInput.files.length) { status.innerHTML = '<span style="color:var(--red);">Select a PDF file</span>'; return; }
  btn.disabled = true;
  status.innerHTML = _oodaHtml();
  try {
    const fd = new FormData();
    fd.append('pdf', fileInput.files[0]);
    fd.append('name', document.getElementById('pdf-name').value.trim() || 'PDF Upload');
    fd.append('description', document.getElementById('pdf-desc').value);
    fd.append('tuner_mode', _getSelectedTunerMode());
    const pdfType = document.getElementById('pdf-type').value;
    if (pdfType) fd.append('antenna_type', pdfType);
    const resp = await fetch(`${BASE_URL}/api/my-antennas/upload-pdf-stream`, { method: 'POST', body: fd });
    if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.detail || `HTTP ${resp.status}`); }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const msg = JSON.parse(line.slice(6));
        if (msg.event === 'step') {
          _oodaSet(msg.phase, msg.status, msg.name + ': ' + (msg.detail || ''));
        } else if (msg.event === 'done') {
          status.innerHTML = '<span style="color:var(--green);">&#10003; Created!</span>';
          fileInput.value = '';
          document.getElementById('pdf-name').value = '';
          document.getElementById('pdf-desc').value = '';
          document.getElementById('pdf-type').selectedIndex = 0;
          await _afterCreate(msg.antenna);
          return;
        } else if (msg.event === 'error') {
          throw new Error(msg.detail);
        }
      }
    }
    if (!status.querySelector('.done-check')) {
      status.innerHTML = '<span style="color:var(--green);">&#10003; Created!</span>';
    }
  } catch (e) {
    status.innerHTML = `<span style="color:var(--red);">Failed: ${esc(e.message)}</span>`;
  } finally { btn.disabled = false; }
}

    </div>
  </div>
</div>

<!-- Unified Create Antenna Modal -->
<div class="modal-overlay" id="create-modal" data-mode="desc">
  <div class="modal">
    <h2>&#x2728; Create Antenna</h2>
    <div class="create-tabs">
      <button class="create-tab active" data-tab="desc" onclick="switchCreateTab('desc')">&#x270F;&#xFE0F; Describe</button>
      <button class="create-tab" data-tab="url" onclick="switchCreateTab('url')">&#x1F310; URL</button>
      <button class="create-tab" data-tab="pdf" onclick="switchCreateTab('pdf')">&#x1F4C4; PDF</button>
      <button class="create-tab" data-tab="surprise" onclick="switchCreateTab('surprise')">&#x1F3B2; Surprise Me</button>
    </div>

    <!-- Describe pane -->
    <div class="create-pane active" id="pane-desc">
      <label>Name *</label>
      <input id="desc-name" placeholder="e.g. My 20m 3-element Yagi">
      <label>Antenna Type</label>
      <select id="desc-type"></select>
      <label>Frequency (MHz)</label>
      <input id="desc-freq" type="number" step="0.01" value="14.0">
      <label>Ground</label>
      <select id="desc-ground">
        <option value="free_space">Free Space</option>
        <option value="perfect">Perfect Ground</option>
        <option value="real">Real Ground (avg earth)</option>
      </select>
      <label>Description / Details</label>
      <textarea id="desc-details" placeholder="Optional: describe element spacing, height, materials, etc."></textarea>
    </div>

    <!-- URL pane -->
    <div class="create-pane" id="pane-url">
      <label>URL *</label>
      <input id="url-input" type="url" placeholder="https://www.karinya.net/g3txq/hexbeam/">
      <label>Name</label>
      <input id="url-name" placeholder="e.g. G3TXQ Hexbeam">
      <label>Antenna Type</label>
      <select id="url-type"><option value="">(auto-detect)</option></select>
      <label>Additional Instructions</label>
      <textarea id="url-desc" placeholder="Optional: any special notes about the design"></textarea>
    </div>

    <!-- PDF pane -->
    <div class="create-pane" id="pane-pdf">
      <label>PDF File *</label>
      <input id="pdf-file" type="file" accept=".pdf">
      <label>Name</label>
      <input id="pdf-name" placeholder="e.g. Cebik 10m Phased Array">
      <label>Antenna Type</label>
      <select id="pdf-type"><option value="">(auto-detect)</option></select>
      <label>Additional Instructions</label>
      <textarea id="pdf-desc" placeholder="Optional: any special notes about the design"></textarea>
    </div>

    <!-- Surprise pane -->
    <div class="create-pane" id="pane-surprise">
      <div class="surprise-pane">
        <div style="font-size: 48px;">&#x1F3B2;</div>
        <p>We'll pick a random antenna type and band, then design it for you.<br>You never know what you'll get!</p>
        <button class="btn btn-ai" id="surprise-btn" onclick="submitSurprise()">Roll the Dice</button>
      </div>
    </div>

    <div class="modal-status" id="create-status"></div>
    <label>Tuner Mode</label>
    <select id="create-tuner-mode">
      <option value="deterministic">Deterministic</option>
      <option value="ga">Seeded GA</option>
    </select>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModals()">Cancel</button>
      <button class="btn btn-ai" id="create-submit" onclick="submitCreate()">Design</button>
    </div>
  </div>
</div>

<!-- Three.js 3D viewer module (loaded after importmap) -->
<script type="module">
  try {
    const mod = await import((window.__BASE_URL || '') + '/static/viewer3d.js?v=3');
    window.Viewer3D = {
      init: mod.init, dispose: mod.dispose,
      showCurrents: mod.showCurrents, clearCurrents: mod.clearCurrents,
    };
  } catch (e) {
    console.warn('3D viewer module failed to load:', e);
  }
</script>

</body>
</html>
